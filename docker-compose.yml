services:

  # ── Wiki web app ─────────────────────────────────────────────────────────────
  wiki:
    build: .
    ports:
      - "${PORT:-8000}:8000"
    volumes:
      - ./wiki:/wiki:ro
      - ./raw:/raw:ro
    environment:
      WIKI_DIR: /wiki
      # LLM backend — leave blank to disable the Ask feature
      LLM_BASE_URL: ${LLM_BASE_URL:-}
      LLM_MODEL:    ${LLM_MODEL:-}
      LLM_API_KEY:  ${LLM_API_KEY:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/llm-status')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── Ollama — local LLM (optional) ────────────────────────────────────────────
  # Start with:  docker compose --profile ollama up
  # Then pull a model: docker compose exec ollama ollama pull llama3.2
  ollama:
    image: ollama/ollama:latest
    profiles: [ollama]
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped
    # Uncomment for GPU support (NVIDIA):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  # ── LiteLLM — multi-provider proxy (optional) ─────────────────────────────────
  # Start with:  docker compose --profile litellm up
  # Configure:   copy litellm-config.example.yaml → litellm-config.yaml and edit it
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    profiles: [litellm]
    ports:
      - "4000:4000"
    volumes:
      - ./litellm-config.yaml:/app/config.yaml:ro
    command: ["--config", "/app/config.yaml", "--port", "4000", "--num_workers", "1"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4000/health/liveliness')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  ollama-data:
